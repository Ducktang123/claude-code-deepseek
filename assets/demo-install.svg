<svg xmlns="http://www.w3.org/2000/svg" width="860" height="548" viewBox="0 0 860 548" font-family="'JetBrains Mono','Cascadia Code',Consolas,'PingFang SC','Microsoft YaHei',monospace" font-size="15">
  <rect x="0" y="0" width="860" height="548" rx="12" fill="#1e1e2e"/>
  <rect x="0" y="0" width="860" height="36" rx="12" fill="#313244"/>
  <rect x="0" y="24" width="860" height="12" fill="#313244"/>
  <circle cx="22" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="44" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="66" cy="18" r="6" fill="#a6e3a1"/>
  <text x="430" y="23" text-anchor="middle" fill="#9399b2" font-size="13">安装.bat / 安装.command — 一键安装</text>
  <g>
    <text x="24" y="68" fill="#cba6f7">============================================================</text>
    <text x="24" y="90" fill="#cba6f7">   Claude Code + DeepSeek  一键安装 (国内镜像版)</text>
    <text x="24" y="112" fill="#6c7086">------------------------------------------------------------</text>
    <text x="24" y="134" fill="#9399b2">   作者：不要口嗨 —— 一个掌握 AI 使用技巧的中登文科生</text>
    <text x="24" y="156" fill="#cba6f7">============================================================</text>
    <text x="24" y="190" fill="#89dceb">&gt;&gt;&gt; 检查 Node.js 环境</text>
    <text x="24" y="212" fill="#a6e3a1">    [OK] <tspan fill="#cdd6f4">已检测到 Node.js v22.17.0</tspan></text>
    <text x="24" y="234" fill="#89dceb">&gt;&gt;&gt; 配置 npm 国内镜像并安装 Claude Code</text>
    <text x="24" y="256" fill="#a6e3a1">    [OK] <tspan fill="#cdd6f4">npm 镜像已设为 npmmirror（淘宝）</tspan></text>
    <text x="24" y="278" fill="#a6e3a1">    [OK] <tspan fill="#cdd6f4">Claude Code 安装/更新完成</tspan></text>
    <text x="24" y="300" fill="#89dceb">&gt;&gt;&gt; 配置 DeepSeek API Key</text>
    <text x="24" y="322" fill="#a6e3a1">    [OK] <tspan fill="#cdd6f4">已接收 Key（长度 35）</tspan></text>
    <text x="24" y="344" fill="#89dceb">&gt;&gt;&gt; 写入环境变量（使用 DeepSeek V4 最新模型）</text>
    <text x="24" y="366" fill="#a6e3a1">    [OK] <tspan fill="#cdd6f4">主力 = deepseek-v4-pro ；快速 = deepseek-v4-flash</tspan></text>
    <text x="24" y="388" fill="#89dceb">&gt;&gt;&gt; 安装技能 (skills)</text>
    <text x="24" y="410" fill="#a6e3a1">    [OK] <tspan fill="#cdd6f4">已安装 12 个技能到 ~/.claude/skills</tspan></text>
    <text x="24" y="444" fill="#a6e3a1">============================================================</text>
    <text x="24" y="466" fill="#a6e3a1">   安装完成！🎉  关掉终端重开，输入 claude 即可使用</text>
    <text x="24" y="488" fill="#a6e3a1">============================================================</text>
    <text x="24" y="522" fill="#cdd6f4">$ <tspan fill="#a6e3a1">claude</tspan><tspan fill="#6c7086"> ▌</tspan></text>
  </g>
</svg>
